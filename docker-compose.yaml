services:
  webtop:
    build: .
    container_name: hermes-webtop
    security_opt:
      - seccomp:unconfined
    # Toda la config vive en .env y se pasa COMPLETA al contenedor. Así el
    # usuario agrega/quita claves HERMES_CFG__* / HERMES_ENV__* sin tocar este
    # archivo. (Incluye TZ/TITLE/CUSTOM_USER/PASSWORD del webtop.)
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
      # Webtop usa s6-overlay (s6 = PID 1) pero NO es la imagen s6 oficial de
      # Hermes, así que la supervisión s6 de Hermes falla con
      # "no such gateway 'default'". Forzamos modo foreground (pre-s6).
      - HERMES_GATEWAY_NO_SUPERVISE=1
      # Computer use (cua-driver): sin telemetría.
      - CUA_DRIVER_RS_TELEMETRY_ENABLED=0
    volumes:
      - ./config:/config
    ports:
      - "3300:3000"
      - "3301:3001"
    shm_size: "2gb"
    restart: unless-stopped
